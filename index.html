function setStatus(id,status){leadState[id].status=status;renderCards();updateProgress();}
function updateProgress(){
var contacted=0,won=0,followUp=0;
Object.keys(leadState).forEach(function(k){var s=leadState[k];if(s.status!=='not_contacted')contacted++;if(s.status==='won')won++;if(s.status==='follow_up')followUp++;});
document.getElementById('progressBar').style.width=(contacted/prospects.length*100)+'%';
document.getElementById('compactProgress').textContent=contacted+'/'+prospects.length;
document.getElementById('miniProgressFill').style.width=(contacted/prospects.length*100)+'%';
document.getElementById('sessionStats').textContent='Today\'s session: '+contacted+' contacted, '+followUp+' follow-ups, '+won+' closed won';
}

var headerExpanded=true;
function toggleHeader(){
headerExpanded=!headerExpanded;
var h=document.getElementById('mainHeader');
var cb=document.getElementById('compactBar');
if(headerExpanded){h.className='header expanded';cb.style.display='none';document.querySelector('.header-toggle').textContent='\u25b2';}
else{h.className='header collapsed';cb.style.display='flex';document.querySelector('.header-toggle').textContent='\u25bc';}
}
window.addEventListener('scroll',function(){if(window.scrollY>80&&headerExpanded)toggleHeader();else if(window.scrollY<=80&&!headerExpanded)toggleHeader();});

function filterCards(rating,btn){
document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
if(btn)btn.classList.add('active');
document.querySelectorAll('.lead-card').forEach(function(card){
if(rating==='all'||card.dataset.rating===rating)card.classList.remove('hidden');
else card.classList.add('hidden');
});
}
function searchCards(query){
var q=query.toLowerCase();
document.querySelectorAll('.lead-card').forEach(function(card){
if(card.dataset.name.indexOf(q)>=0||card.dataset.contact.indexOf(q)>=0)card.classList.remove('hidden');
else card.classList.add('hidden');
});
}

function copyToClipboard(text,msg){
if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(function(){showToast(msg)}).catch(function(){fallbackCopy(text,msg)});}
else{fallbackCopy(text,msg);}
}
function fallbackCopy(text,msg){
var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';
document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast(msg);
}
function showToast(msg){
var toast=document.getElementById('copyToast');
toast.textContent=msg;toast.style.opacity='1';clearTimeout(toast._timer);toast._timer=setTimeout(function(){toast.style.opacity='0';},1500);
}
function copyText(text,msg){copyToClipboard(text,msg);}

function openGmail(id){
var p=prospects.filter(function(x){return x.id===id})[0];
var subj=document.getElementById('subj_'+id).value;
var body=document.getElementById('body_'+id).value;
var to=p.email||'';
window.open('https://mail.google.com/mail/?view=cm&to='+encodeURIComponent(to)+'&su='+encodeURIComponent(subj)+'&body='+encodeURIComponent(body),'_blank');
}
function copyEmail(id){
var subj=document.getElementById('subj_'+id).value;
var body=document.getElementById('body_'+id).value;
copyToClipboard('Subject: '+subj+'\n\n'+body,'Email copied!');
}
function resetEmail(id){
var p=prospects.filter(function(x){return x.id===id})[0];
document.getElementById('subj_'+id).value=p.emailSubject;
document.getElementById('body_'+id).value=p.emailBody;
showToast('Email reset to original draft');
}

function exportLead(id){
var p=prospects.filter(function(x){return x.id===id})[0];
var s=leadState[id];
var text='Company: '+p.name+'\nDistance: '+p.distance+'\nEmployees: '+p.employees+'\nRating: '+p.rating+'\nWebsite: '+p.website+'\nInstagram: '+p.instagram+'\nContact: '+p.contact+' - '+p.title+'\nEmail: '+p.email+'\nPhone: '+p.phone+'\nStatus: '+s.status+'\nNotes: '+s.notes;
copyToClipboard(text,p.name+' exported!');
}
function exportAll(){
var csv='Company,Distance,Employees,Rating,Website,Instagram,Contact,Title,Email,Phone,Status,Notes\n';
prospects.forEach(function(p){var s=leadState[p.id];csv+='"'+p.name+'","'+p.distance+'","'+p.employees+'","'+p.rating+'","'+p.website+'","'+p.instagram+'","'+p.contact+'","'+p.title+'","'+p.email+'","'+p.phone+'","'+s.status+'","'+s.notes.replace(/"/g,'""')+'"\n';});
var blob=new Blob([csv],{type:'text/csv'});var url=URL.createObjectURL(blob);
var a=document.createElement('a');a.href=url;a.download='bulkamania-prospects-2026-03-30.csv';a.click();showToast('All leads exported!');
}
