function getInitials(name) {
  return name.split(/\s+/).map(w=>w[0]).join('').substring(0,2).toUpperCase();
}

function showToast(msg) {
  const t = document.getElementById('copyToast');
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 1500);
}

function copyToClipboard(text, msg) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast(msg)).catch(() => fallbackCopy(text, msg));
  } else { fallbackCopy(text, msg); }
}

function fallbackCopy(text, msg) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
  document.body.appendChild(ta); ta.select(); document.execCommand('copy');
  document.body.removeChild(ta); showToast(msg);
}

function updateProgress() {
  let contacted = 0;
  Object.values(leadStatus).forEach(s => { if (s && s !== 'Not Contacted') contacted++; });
  const pct = (contacted / prospects.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = contacted + '/' + prospects.length;
  let hot=0,warm=0,cool=0;
  prospects.forEach(p => {
    if(p.dealRating==='Hot') hot++;
    else if(p.dealRating==='Warm') warm++;
    else cool++;
  });
  document.getElementById('hotCount').textContent = '🔥 ' + hot;
  document.getElementById('warmCount').textContent = '🟠 ' + warm;
  document.getElementById('coolCount').textContent = '🔵 ' + cool;
}

function setStatus(idx, status) {
  leadStatus[idx] = status;
  const card = document.getElementById('card-' + idx);
  card.className = 'lead-card ' + prospects[idx].dealRating.toLowerCase();
  if (status === 'Closed Won') card.classList.add('status-won');
  if (status === 'Closed Lost') card.classList.add('status-lost');
  const btns = card.querySelectorAll('.status-btn');
  btns.forEach(b => {
    b.className = 'status-btn';
    if (b.dataset.status === status) {
      const cls = {'Not Contacted':'active-nc','Contacted':'active-contacted','Follow Up':'active-followup','Closed Won':'active-won','Closed Lost':'active-lost'};
      b.classList.add(cls[status] || '');
    }
  });
  updateProgress();
}

function openGmail(idx) {
  const subj = document.getElementById('subj-' + idx).value;
  const body = document.getElementById('body-' + idx).value;
  const to = prospects[idx].contactEmail;
  window.open('https://mail.google.com/mail/?view=cm&to=' + encodeURIComponent(to) + '&su=' + encodeURIComponent(subj) + '&body=' + encodeURIComponent(body), '_blank');
}

function copyEmail(idx) {
  const subj = document.getElementById('subj-' + idx).value;
  const body = document.getElementById('body-' + idx).value;
  copyToClipboard('Subject: ' + subj + '\n\n' + body, '✅ Email copied!');
}

function resetEmail(idx) {
  document.getElementById('subj-' + idx).value = originalEmails[idx].subject;
  document.getElementById('body-' + idx).value = originalEmails[idx].body;
}

function copyDM(idx, type) {
  const el = document.getElementById(type + '-dm-' + idx);
  copyToClipboard(el.value, '✅ DM copied!');
}

function exportLead(idx) {
  const p = prospects[idx];
  const status = leadStatus[idx] || 'Not Contacted';
  const notes = document.getElementById('notes-' + idx)?.value || '';
  const text = `${p.companyName} | ${p.industry} | ${p.distance}km | ${p.employees} emp | ${p.dealRating} | Status: ${status} | ${p.contactEmail} | ${p.contactPhone} | Notes: ${notes}`;
  copyToClipboard(text, '✅ Lead exported!');
}

function exportAll() {
  let csv = 'Company,Distance,Employees,Rating,Status,Email,Phone,Notes\n';
  prospects.forEach((p,i) => {
    const status = leadStatus[i] || 'Not Contacted';
    const notes = (document.getElementById('notes-'+i)?.value || '').replace(/,/g,';');
    csv += `"${p.companyName}",${p.distance},${p.employees},${p.dealRating},${status},${p.contactEmail},${p.contactPhone},"${notes}"\n`;
  });
  copyToClipboard(csv, '✅ All leads exported as CSV!');
}

function filterCards(rating) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.lead-card').forEach(card => {
    if (rating === 'all' || card.dataset.rating === rating) card.style.display = '';
    else card.style.display = 'none';
  });
}

function searchCards(q) {
  q = q.toLowerCase();
  document.querySelectorAll('.lead-card').forEach(card => {
    const text = card.textContent.toLowerCase();
    card.style.display = text.includes(q) ? '' : 'none';
  });
}

function buildCards() {
  const container = document.getElementById('cardsContainer');
  prospects.forEach((p, i) => {
    originalEmails[i] = { subject: p.emailSubject, body: p.emailBody };
    originalDMs[i] = p.instagramDM;
    originalLinkedinDMs[i] = p.linkedinDM;

    const initials = getInitials(p.companyName);
    const bgColor = colors[i % colors.length];
    const ratingClass = p.dealRating.toLowerCase();

    const igHidden = (!p.instagramUrl || p.instagramUrl === 'N/A') ? 'style="display:none"' : '';
    const liHidden = (!p.linkedin || p.linkedin === 'N/A') ? 'style="display:none"' : '';

    const card = document.createElement('div');
    card.className = 'lead-card ' + ratingClass;
    card.id = 'card-' + i;
    card.dataset.rating = p.dealRating;

    card.innerHTML = `
    <div class="card-content">
      <div class="card-left">
        <div class="company-header">
          <div class="company-initials" style="background:${bgColor}">${initials}</div>
          <div>
            <div class="company-name"><a href="${p.website}" target="_blank">${p.companyName}</a></div>
            <div style="font-size:12px;color:#666">${p.industry} | ${p.address}</div>
          </div>
        </div>
        <div class="badges">
          <span class="badge badge-distance">📍 ${p.distance} km</span>
          <span class="badge badge-employees">👥 ~${p.employees} employees</span>
          <span class="badge badge-${ratingClass}">${p.dealRating === 'Hot' ? '🔥' : p.dealRating === 'Warm' ? '🟠' : '🔵'} ${p.dealRating}</span>
          <span class="badge badge-rating">⭐ ${p.googleRating}</span>
          <span class="badge badge-social">📱 ${p.socialActivity}</span>
        </div>
        <div class="info-row"><span class="info-label">Contact:</span><span class="info-value">${p.contactName} — ${p.contactTitle}</span></div>
        <div class="info-row"><span class="info-label">Email:</span><span class="info-value"><a href="mailto:${p.contactEmail}">${p.contactEmail}</a></span></div>
        <div class="info-row"><span class="info-label">Phone:</span><span class="info-value"><a href="tel:${p.contactPhone}">${p.contactPhone}</a></span></div>
        <div class="info-row" ${igHidden}><span class="info-label">Instagram:</span><span class="info-value"><a href="${p.instagramUrl}" target="_blank">${p.instagram}</a></span></div>
        <div class="info-row" ${liHidden}><span class="info-label">LinkedIn:</span><span class="info-value"><a href="${p.linkedin}" target="_blank">Company Page</a></span></div>
        <div class="info-row"><span class="info-label">Connections:</span><span class="info-value">${p.mutualConnections}</span></div>
        ${p.buyingSignals ? '<div class="signal-box">💡 <strong>Buying Signals:</strong> ' + p.buyingSignals + '</div>' : ''}
        ${p.events ? '<div class="event-box">📅 <strong>Events:</strong> ' + p.events + '</div>' : ''}
        <div class="info-row"><span class="info-label">Door Opener:</span><span class="info-value">${p.doorOpener}</span></div>
        <div class="info-row"><span class="info-label">Competitors:</span><span class="info-value">${p.competitorWatch}</span></div>
        <div class="info-row"><span class="info-label">Notes:</span><span class="info-value">${p.comments}</span></div>
      </div>
      <div class="card-right">
        <div class="section-title">Status</div>
        <div class="status-row">
          <button class="status-btn active-nc" data-status="Not Contacted" onclick="setStatus(${i},'Not Contacted')">Not Contacted</button>
          <button class="status-btn" data-status="Contacted" onclick="setStatus(${i},'Contacted')">Contacted</button>
          <button class="status-btn" data-status="Follow Up" onclick="setStatus(${i},'Follow Up')">Follow Up</button>
          <button class="status-btn" data-status="Closed Won" onclick="setStatus(${i},'Closed Won')">Closed Won</button>
          <button class="status-btn" data-status="Closed Lost" onclick="setStatus(${i},'Closed Lost')">Closed Lost</button>
        </div>

        <div class="email-section">
          <h4>📧 Email Outreach</h4>
          <input type="text" class="email-subject" id="subj-${i}" value="${p.emailSubject.replace('"','&quot;')}">
          <textarea class="email-body" id="body-${i}" rows="8">${p.emailBody}</textarea>
          <div class="file-upload">
            <label>📎 Attach Presentation <input type="file" onchange="this.parentElement.nextElementSibling.textContent='✅ '+this.files[0].name;this.closest('.email-section').querySelector('.reminder-bar').style.display='block';this.closest('.email-section').querySelector('.reminder-bar').innerHTML='⚠️ Don\'t forget to attach <b>'+this.files[0].name+'</b> in Gmail!'"></label>
            <span class="file-name"></span>
          </div>
          <div class="reminder-bar"></div>
          <a href="https://chatgpt.com/g/g-687f1127e25881918cab0e80dc5f0e39-bulkamania-presentation-creator" target="_blank" class="btn btn-pres btn-sm" style="margin:6px 0;display:inline-flex">🎨 Create Presentation</a>
          <div style="font-size:11px;color:#888;margin-bottom:6px">Use the Bulkamania GPT to create a custom product mockup, then attach it to your email.</div>
          <div class="btn-row">
            <button class="btn btn-gmail" onclick="openGmail(${i})">Open in Gmail</button>
            <button class="btn btn-copy" onclick="copyEmail(${i})">Copy Email</button>
            <span class="reset-link" onclick="resetEmail(${i})">Reset</span>
          </div>
        </div>

        <div class="dm-section" ${igHidden}>
          <h4>📸 Instagram DM</h4>
          <textarea class="dm-body" id="ig-dm-${i}" rows="3">${p.instagramDM}</textarea>
          <div class="char-count"><span id="ig-count-${i}">${p.instagramDM ? p.instagramDM.length : 0}</span> chars</div>
          <div class="file-upload">
            <label>📎 Attach Mockup <input type="file" onchange="this.parentElement.nextElementSibling.textContent='✅ '+this.files[0].name"></label>
            <span class="file-name"></span>
          </div>
          <a href="https://chatgpt.com/g/g-687f1127e25881918cab0e80dc5f0e39-bulkamania-presentation-creator" target="_blank" class="btn btn-pres btn-sm" style="margin:4px 0;display:inline-flex">🎨 Create Presentation</a>
          <div class="btn-row">
            <a href="${p.instagramUrl}" target="_blank" class="btn btn-ig">Open Instagram</a>
            <button class="btn btn-copy" onclick="copyDM(${i},'ig')">Copy DM</button>
          </div>
          <div class="workflow-hint">1. Create presentation → 2. Copy DM → 3. Open Instagram → 4. Paste DM + attach file</div>
        </div>

        <div class="dm-section" ${liHidden}>
          <h4>💼 LinkedIn DM</h4>
          <textarea class="dm-body" id="li-dm-${i}" rows="3">${p.linkedinDM}</textarea>
          <div class="char-count"><span id="li-count-${i}">${p.linkedinDM ? p.linkedinDM.length : 0}</span> chars</div>
          <div class="file-upload">
            <label>📎 Attach Mockup <input type="file" onchange="this.parentElement.nextElementSibling.textContent='✅ '+this.files[0].name"></label>
            <span class="file-name"></span>
          </div>
          <div class="btn-row">
            <a href="${p.linkedin}" target="_blank" class="btn btn-li">Open LinkedIn</a>
            <button class="btn btn-copy" onclick="copyDM(${i},'li')">Copy LinkedIn DM</button>
          </div>
          <div class="workflow-hint">1. Create presentation → 2. Copy DM → 3. Open LinkedIn → 4. Connect + paste DM + attach file</div>
        </div>

        <div style="margin-top:8px">
          <div class="section-title collapsible" onclick="this.nextElementSibling.classList.toggle('open')">🎨 Mockup Notes ▸</div>
          <div class="collapsible-content"><div style="font-size:12px;padding:6px;background:#f0f0f0;border-radius:4px">${p.mockupNotes}</div></div>
        </div>

        <div style="margin-top:8px">
          <div class="section-title">📝 Rep Notes</div>
          <textarea class="notes-area" id="notes-${i}" placeholder="Add your notes here..."></textarea>
        </div>

        <div style="margin-top:8px;text-align:right">
          <button class="export-btn" onclick="exportLead(${i})">📋 Export Lead</button>
        </div>
      </div>
    </div>`;

    container.appendChild(card);

    // Update char counts for DM textareas
    const igDm = document.getElementById('ig-dm-' + i);
    if (igDm) {
      igDm.addEventListener('input', function() {
        document.getElementById('ig-count-' + i).textContent = this.value.length;
      });
    }
    const liDm = document.getElementById('li-dm-' + i);
    if (liDm) {
      liDm.addEventListener('input', function() {
        document.getElementById('li-count-' + i).textContent = this.value.length;
      });
    }
  });
  updateProgress();
}

buildCards();
</script>
</body>
</html>
