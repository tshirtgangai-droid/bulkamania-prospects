        ];

        const state = {
            statuses: {},
            emails: {},
            dmInstagram: {},
            dmLinkedin: {},
            notes: {},
            filter: 'all',
            search: ''
        };

        prospects.forEach(p => {
            state.statuses[p.id] = 'not-contacted';
            state.emails[p.id] = { subject: p.emailSubject, body: p.emailBody };
            state.dmInstagram[p.id] = p.instagramDM;
            state.dmLinkedin[p.id] = p.linkedinDM;
            state.notes[p.id] = '';
        });

        function renderProspects() {
            const container = document.getElementById('prospectsContainer');
            container.innerHTML = '';

            prospects.forEach(prospect => {
                const matchesFilter = state.filter === 'all' || prospect.rating === state.filter;
                const matchesSearch = prospect.companyName.toLowerCase().includes(state.search.toLowerCase()) ||
                    prospect.contactName.toLowerCase().includes(state.search.toLowerCase()) ||
                    prospect.address.toLowerCase().includes(state.search.toLowerCase());

                if (!matchesFilter || !matchesSearch) return;

                const card = createCard(prospect);
                container.appendChild(card);
            });

            updateProgress();
        }

        function createCard(prospect) {
            const card = document.createElement('div');
            card.className = 'prospect-card';
            const badgeClass = `badge-rating-${prospect.rating}`;

            card.innerHTML = `<div class="card-content"><div class="card-left"><h3>${prospect.companyName}</h3><div class="card-badges"><span class="badge badge-distance">${prospect.distance}</span><span class="badge badge-employees">${prospect.employees}</span><span class="badge ${badgeClass}">${prospect.rating.toUpperCase()}</span></div><div class="card-info"><div class="info-row"><span class="info-label">Contact:</span><span class="info-value">${prospect.contactName} - ${prospect.contactTitle}</span></div><div class="info-row"><span class="info-label">Email:</span><span class="info-value"><a href="mailto:${prospect.contactEmail}" style="color: #667eea; text-decoration: none;">${prospect.contactEmail}</a></span></div><div class="info-row"><span class="info-label">Phone:</span><span class="info-value"><a href="tel:${prospect.contactPhone}" style="color: #667eea; text-decoration: none;">${prospect.contactPhone}</a></span></div><div class="info-row"><span class="info-label">Address:</span><span class="info-value">${prospect.address}</span></div><div class="info-row"><span class="info-label">Industry:</span><span class="info-value">${prospect.industry}</span></div></div><div class="social-links"><a href="${prospect.website}" target="_blank" class="social-link">🌐 Website</a><a href="${prospect.instagramUrl}" target="_blank" class="social-link">📸 Instagram</a><a href="${prospect.linkedin}" target="_blank" class="social-link">💼 LinkedIn</a></div><div class="callout callout-buying"><strong>Buying Signals:</strong> ${prospect.buyingSignals}</div><div class="callout callout-events"><strong>Events:</strong> ${prospect.events}</div><div class="comments-section">${prospect.comments}</div><button class="mockup-toggle" onclick="toggleMockup(${prospect.id})">📋 Mockup Notes</button><div class="mockup-content" id="mockup-${prospect.id}">${prospect.mockupNotes}</div></div><div class="card-right"><div class="action-section"><div class="section-label">Status</div><div class="status-tracker"><button class="status-btn ${state.statuses[prospect.id] === 'not-contacted' ? 'active' : ''}" onclick="updateStatus(${prospect.id}, 'not-contacted')">Not Contacted</button><button class="status-btn contacted ${state.statuses[prospect.id] === 'contacted' ? 'active' : ''}" onclick="updateStatus(${prospect.id}, 'contacted')">Contacted</button><button class="status-btn follow-up ${state.statuses[prospect.id] === 'follow-up' ? 'active' : ''}" onclick="updateStatus(${prospect.id}, 'follow-up')">Follow Up</button><button class="status-btn closed-won ${state.statuses[prospect.id] === 'closed-won' ? 'active' : ''}" onclick="updateStatus(${prospect.id}, 'closed-won')">Won</button><button class="status-btn closed-lost ${state.statuses[prospect.id] === 'closed-lost' ? 'active' : ''}" onclick="updateStatus(${prospect.id}, 'closed-lost')">Lost</button></div></div><div class="action-section"><div class="section-label">Email</div><div class="email-field"><input type="text" value="${state.emails[prospect.id].subject}" placeholder="Email subject" onchange="updateEmailSubject(${prospect.id}, this.value)"><textarea placeholder="Email body" onchange="updateEmailBody(${prospect.id}, this.value)">${state.emails[prospect.id].body}</textarea><div class="action-buttons"><button class="small-btn primary" onclick="openGmail(${prospect.id})">✉️ Open in Gmail</button><button class="small-btn" onclick="copyEmail(${prospect.id})">📋 Copy</button><button class="small-btn" onclick="resetEmail(${prospect.id})">🔄 Reset</button></div></div></div><div class="action-section"><div class="section-label">Instagram DM</div><div class="dm-field"><textarea placeholder="Instagram DM" onchange="updateDMInstagram(${prospect.id}, this.value)">${state.dmInstagram[prospect.id]}</textarea><div class="char-count"><span id="ig-count-${prospect.id}">${state.dmInstagram[prospect.id].length}</span>/1000</div><div class="action-buttons"><button class="small-btn" onclick="copyDMInstagram(${prospect.id})">📋 Copy</button><button class="small-btn primary" onclick="window.open('${prospect.instagramUrl}', '_blank')">📸 Open</button></div></div></div><div class="action-section"><div class="section-label">LinkedIn DM</div><div class="dm-field"><textarea placeholder="LinkedIn DM" onchange="updateDMLinkedin(${prospect.id}, this.value)">${state.dmLinkedin[prospect.id]}</textarea><div class="char-count"><span id="li-count-${prospect.id}">${state.dmLinkedin[prospect.id].length}</span>/1000</div><div class="action-buttons"><button class="small-btn" onclick="copyDMLinkedin(${prospect.id})">📋 Copy</button><button class="small-btn primary" onclick="window.open('${prospect.linkedin}', '_blank')">💼 Open</button></div></div></div><div class="action-section"><div class="section-label">Quick Actions</div><div class="action-buttons three-col"><button class="small-btn" onclick="window.open('tel:${prospect.contactPhone}')">📞 Call</button><button class="small-btn" onclick="window.open('${prospect.website}', '_blank')">🌐 Website</button><a href="https://chatgpt.com/g/g-687f1127e25881918cab0e80dc5f0e39-bulkamania-presentation-creator" target="_blank" class="small-btn primary" style="text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center;">🎨 Presentation</a></div></div><div class="action-section"><div class="section-label">Rep Notes</div><textarea class="notes-textarea" placeholder="Add notes about this prospect..." onchange="updateNotes(${prospect.id}, this.value)">${state.notes[prospect.id]}</textarea></div><div class="action-section"><button class="small-btn primary" style="width: 100%; padding: 8px; font-size: 12px;" onclick="exportLead(${prospect.id})">📥 Export This Lead</button></div></div></div>`;
            return card;
        }

        function updateStatus(id, status) { state.statuses[id] = status; updateProgress(); renderProspects(); }
        function updateEmailSubject(id, value) { state.emails[id].subject = value; }
        function updateEmailBody(id, value) { state.emails[id].body = value; }
        function updateDMInstagram(id, value) { state.dmInstagram[id] = value; document.getElementById(`ig-count-${id}`).textContent = value.length; }
        function updateDMLinkedin(id, value) { state.dmLinkedin[id] = value; document.getElementById(`li-count-${id}`).textContent = value.length; }
        function updateNotes(id, value) { state.notes[id] = value; }
        function toggleMockup(id) { document.getElementById(`mockup-${id}`).classList.toggle('visible'); }

        function openGmail(id) {
            const subject = encodeURIComponent(state.emails[id].subject);
            const body = encodeURIComponent(state.emails[id].body);
            const prospect = prospects.find(p => p.id === id);
            const to = encodeURIComponent(prospect.contactEmail);
            window.open(`https://mail.google.com/mail/?view=cm&to=${to}&su=${subject}&body=${body}`, '_blank');
        }

        function copyEmail(id) {
            const text = `Subject: ${state.emails[id].subject}\n\n${state.emails[id].body}`;
            copyToClipboard(text, 'Email copied!');
        }

        function copyToClipboard(text, msg) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => showToast(msg)).catch(() => fallbackCopy(text, msg));
            } else {
                fallbackCopy(text, msg);
            }
        }

        function fallbackCopy(text, msg) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showToast(msg);
        }

        function showToast(msg) {
            let toast = document.getElementById('copyToast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'copyToast';
                toast.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;';
                document.body.appendChild(toast);
            }
            toast.textContent = msg;
            toast.style.opacity = '1';
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => { toast.style.opacity = '0'; }, 1500);
        }

        function resetEmail(id) {
            const prospect = prospects.find(p => p.id === id);
            state.emails[id].subject = prospect.emailSubject;
            state.emails[id].body = prospect.emailBody;
            renderProspects();
        }

        function copyDMInstagram(id) { copyToClipboard(state.dmInstagram[id], 'Instagram DM copied!'); }
        function copyDMLinkedin(id) { copyToClipboard(state.dmLinkedin[id], 'LinkedIn DM copied!'); }

        function exportLead(id) {
            const prospect = prospects.find(p => p.id === id);
            const csv = `Company,Contact,Email,Phone,Status,Notes\n"${prospect.companyName}","${prospect.contactName}","${prospect.contactEmail}","${prospect.contactPhone}","${state.statuses[id]}","${state.notes[id].replace(/"/g, '""')}"`;
            download('prospect_' + prospect.companyName.replace(/\s+/g, '_') + '.csv', csv);
        }

        function exportAllProspects() {
            let csv = 'Company,Contact,Title,Email,Phone,Distance,Employees,Rating,Status,Notes\n';
            prospects.forEach(p => {
                csv += `"${p.companyName}","${p.contactName}","${p.contactTitle}","${p.contactEmail}","${p.contactPhone}","${p.distance}","${p.employees}","${p.rating}","${state.statuses[p.id]}","${state.notes[p.id].replace(/"/g, '""')}"\n`;
            });
            download('bulkamania_all_prospects.csv', csv);
        }

        function download(filename, text) {
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/csv;charset=utf-8,' + encodeURIComponent(text));
            element.setAttribute('download', filename);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        function updateProgress() {
            const contacted = Object.values(state.statuses).filter(s => s !== 'not-contacted').length;
            const total = prospects.length;
            const percent = (contacted / total) * 100;
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('statsTotal').textContent = total;
            const hot = prospects.filter(p => p.rating === 'hot').length;
            const warm = prospects.filter(p => p.rating === 'warm').length;
            const cool = prospects.filter(p => p.rating === 'cool').length;
            document.getElementById('statsHot').textContent = hot;
            document.getElementById('statsWarm').textContent = warm;
            document.getElementById('statsCool').textContent = cool;
            document.getElementById('totalContacted').textContent = Object.values(state.statuses).filter(s => s === 'contacted').length;
            document.getElementById('totalFollowUp').textContent = Object.values(state.statuses).filter(s => s === 'follow-up').length;
            document.getElementById('totalWon').textContent = Object.values(state.statuses).filter(s => s === 'closed-won').length;
            document.getElementById('totalLost').textContent = Object.values(state.statuses).filter(s => s === 'closed-lost').length;
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    state.filter = this.dataset.filter;
                    renderProspects();
                });
            });

            document.getElementById('searchInput').addEventListener('input', function(e) {
                state.search = e.target.value;
                renderProspects();
            });

            document.getElementById('exportAllBtn').addEventListener('click', exportAllProspects);

            let lastScrollTop = 0;
            window.addEventListener('scroll', function() {
                const scrollTop = window.scrollY;
                const header = document.getElementById('header');
                if (scrollTop > 80) {
                    header.classList.add('collapsed');
                    document.getElementById('headerTop').classList.add('collapsed');
                    document.getElementById('progressSection').classList.add('collapsed');
                } else {
                    header.classList.remove('collapsed');
                    document.getElementById('headerTop').classList.remove('collapsed');
                    document.getElementById('progressSection').classList.remove('collapsed');
                }
            });

            document.getElementById('toggleHeader').addEventListener('click', function() {
                document.getElementById('progressSection').classList.toggle('collapsed');
            });

            renderProspects();
        });
    </script>
</body>
