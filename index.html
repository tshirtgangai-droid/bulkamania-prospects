// ============================================
// CLIPBOARD & TOAST FUNCTIONS
// ============================================
function copyToClipboard(text, msg) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => showToast(msg)).catch(() => fallbackCopy(text, msg));
    } else {
        fallbackCopy(text, msg);
    }
}

function fallbackCopy(text, msg) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(msg);
}

function showToast(msg) {
    let toast = document.getElementById('copyToast');
    if (!toast) {
        toast = document.createElement('div');
        toast.id = 'copyToast';
        toast.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;';
        document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.style.opacity = '1';
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => { toast.style.opacity = '0'; }, 1500);
}

    const emailData = state.emails[index] || generateEmailTemplate(prospect);

    const status = state.statuses[index] || "Not Contacted";
    const notes = state.notes[index] || "";

    const initials = prospect.name.split(' ').slice(0, 2).map(w => w[0]).join('');
    const stars = '★'.repeat(Math.floor(parseFloat(prospect.googleRating || 4))) + '☆'.repeat(5 - Math.floor(parseFloat(prospect.googleRating || 4)));
    const phoneDisplay = prospect.contactPhone && prospect.contactPhone !== "Not found" ? prospect.contactPhone : "Not listed";
    const phoneHref = prospect.contactPhone && prospect.contactPhone !== "Not found" ? `tel:${prospect.contactPhone}` : "#";
    const phoneClass = prospect.contactPhone && prospect.contactPhone !== "Not found" ? "" : "style='color:#ccc;cursor:default;'";

            </div>

            <div class="rating-section">
                <span class="stars">${stars}</span>
                <span style="font-size: 12px; color: #666;">${prospect.googleRating}/5</span>
            </div>

            <div class="intel-section">
                <div class="intel-label">👤 Contact</div>
                <div class="intel-value">
                    <strong>${prospect.contactName}</strong> — ${prospect.contactTitle}<br>
                    <a href="mailto:${prospect.contactEmail}" style="color: #cc0000;">${prospect.contactEmail}</a><br>
                    <a href="${phoneHref}" ${phoneClass}>${phoneDisplay}</a>
                </div>
            </div>

            <div class="intel-section">
                <div class="intel-label">🌐 Web & Social</div>
                <div class="social-links">
                    <a href="${prospect.instagramUrl}" target="_blank">${prospect.instagram}</a>
                    <a href="${prospect.linkedin}" target="_blank">LinkedIn</a>
                </div>
            </div>

            <div class="intel-section">
                <div class="intel-label">📍 Location</div>
                <div class="intel-value">${prospect.address}</div>
            </div>

            <div class="intel-section">
                <div class="intel-label">🎯 Buying Signals</div>
                <div class="callout-yellow">${prospect.buyingSignals}</div>
            </div>

            <div class="intel-section">
                <div class="intel-label">🎁 Door Opener</div>
                <div class="intel-value">${prospect.doorOpener}</div>
            </div>

            <div class="intel-section">
                <div class="intel-label">📅 Upcoming Events</div>
                <div class="intel-value">${prospect.events}</div>
            </div>

            <div class="intel-section">
                <div class="intel-label">💬 Comments</div>
                <div class="intel-value">${prospect.comments}</div>
            </div>

            <div class="intel-section">
                <div class="intel-label">🤝 Connections</div>
                <div class="intel-value">${prospect.mutualConnections}</div>
            </div>

            <div class="intel-section">
                <div class="intel-label">📞 Alt Contact</div>
                <div class="intel-value">${prospect.altContact}</div>
            </div>
        </div>

        <!-- RIGHT SIDE - ACTIONS -->
        <div class="prospect-actions">
            <!-- STATUS TRACKER -->
            <div class="action-panel">
                <div class="panel-title">📊 Status</div>
                <div class="status-buttons">
                    ${["Not Contacted", "Contacted", "Follow Up", "Closed Won", "Closed Lost"].map(s =>
                        `<button class="status-btn ${status === s ? 'active' : ''}" data-status="${s}" onclick="setStatus(${index}, '${s}')">${s}</button>`
                    ).join('')}
                </div>
            </div>

            <!-- EMAIL OUTREACH -->
            <div class="action-panel">
                <div class="panel-title">📧 Email Outreach</div>
                <div class="form-group">
                    <label class="form-label">Subject</label>
                    <input type="text" class="form-input" data-email-subject="${index}" value="${emailData.subject}" placeholder="Email subject">
                </div>
                <div class="form-group">
                    <label class="form-label">Body</label>
                    <textarea class="form-textarea" data-email-body="${index}" placeholder="Email body">${emailData.body}</textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Attach Presentation</label>
                    <input type="file" class="form-input" data-email-file="${index}" accept=".pdf,.ppt,.pptx" style="padding:6px;">
                </div>
                <div class="form-buttons">
                    <button class="form-btn" onclick="openInGmail(${index})">📨 Open in Gmail</button>
                    <button class="form-btn" onclick="copyEmailToClipboard(${index})">📋 Copy Email</button>
                    <a class="reset-link" onclick="resetEmail(${index})">Reset</a>
                </div>
            </div>

            <!-- INSTAGRAM DM -->
            <div class="action-panel">
                <div class="panel-title">📱 Instagram DM</div>
                <div class="form-group">
                    <textarea class="form-textarea" data-ig-dm="${index}" placeholder="Instagram message" style="min-height:60px;">${igDMData}</textarea>
                    <div class="char-count" id="igCharCount${index}">${igDMData.length}/300 chars</div>
                </div>
                <div class="form-group">
                    <label class="form-label">Attach Mockup</label>
                    <input type="file" class="form-input" data-ig-file="${index}" accept="image/*" style="padding:6px;">
                </div>
                <div class="form-buttons">
                    <button class="form-btn" onclick="openInstagram('${prospect.instagramUrl}')">📲 Open Instagram</button>
                    <button class="form-btn" onclick="copyDMToClipboard(${index}, 'ig')">📋 Copy DM</button>
                </div>
            </div>

            <!-- LINKEDIN DM -->
            <div class="action-panel">
                <div class="panel-title">💼 LinkedIn DM</div>
                <div class="form-group">
                    <textarea class="form-textarea" data-li-dm="${index}" placeholder="LinkedIn message" style="min-height:60px;">${liDMData}</textarea>
                    <div class="char-count" id="liCharCount${index}">${liDMData.length}/300 chars</div>
                </div>
                <div class="form-group">
                    <label class="form-label">Attach Mockup</label>
                    <input type="file" class="form-input" data-li-file="${index}" accept="image/*" style="padding:6px;">
                </div>
                <div class="form-buttons">
                    <button class="form-btn" onclick="openLinkedIn('${prospect.linkedin}')">🔗 Open LinkedIn</button>
                    <button class="form-btn" onclick="copyDMToClipboard(${index}, 'li')">📋 Copy DM</button>
                </div>
            </div>

            <!-- QUICK ACTIONS -->
            <div class="action-panel">
                <div class="panel-title">⚡ Quick Actions</div>
                <div class="form-buttons">
                    <button class="form-btn form-btn-secondary" onclick="window.location.href='${phoneHref}'" ${phoneClass}>📞 Call</button>
                    <button class="form-btn form-btn-secondary" onclick="window.open('${prospect.website}')">🌐 Website</button>
                    <button class="form-btn form-btn-secondary" onclick="copyToClipboard('${prospect.altContact}', 'Alt contact copied!')">📝 Alt Contact</button>
                </div>
            </div>

            <!-- MOCKUP NOTES -->
            <div class="collapsible" onclick="this.classList.toggle('open')">
                <span>🎨 Mockup Notes</span>
                <span>▼</span>
            </div>
            <div class="collapsible-content">${prospect.mockupNotes}</div>

            <!-- REP NOTES -->
            <div class="action-panel">
                <div class="panel-title">📝 Rep Notes</div>
                <textarea class="form-textarea" data-rep-notes="${index}" placeholder="Your private notes..." style="min-height:80px;">${notes}</textarea>
                <button class="form-btn form-btn-secondary" style="margin-top: 6px; width: 100%;" onclick="saveRepNotes(${index})">Save Notes</button>
            </div>

            <!-- EXPORT -->
            <div class="action-panel">
                <button class="form-btn" style="width: 100%;" onclick="exportProspectData(${index})">📥 Export This Lead</button>
            </div>
        </div>
    </div>
    `;
}

// ============================================
// ACTION HANDLERS
// ============================================
function setStatus(index, status) {
    state.statuses[index] = status;
    const card = document.querySelector(`[data-prospect="${index}"]`);
    card.querySelectorAll('.status-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.status === status);
    });
    updateProgress();
}

function openInGmail(index) {
    const subject = document.querySelector(`[data-email-subject="${index}"]`).value;
    const body = document.querySelector(`[data-email-body="${index}"]`).value;
    const to = prospects[index].contactEmail;
    window.open(`https://mail.google.com/mail/?view=cm&to=${to}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`, '_blank');
}

function copyEmailToClipboard(index) {
    const subject = document.querySelector(`[data-email-subject="${index}"]`).value;
    const body = document.querySelector(`[data-email-body="${index}"]`).value;
    const fullEmail = `Subject: ${subject}\n\n${body}`;
    copyToClipboard(fullEmail, '✓ Email copied to clipboard!');
}

function resetEmail(index) {
    const template = generateEmailTemplate(prospects[index]);
    document.querySelector(`[data-email-subject="${index}"]`).value = template.subject;
    document.querySelector(`[data-email-body="${index}"]`).value = template.body;
}

function openInstagram(url) {
    window.open(url, '_blank');
}

function openLinkedIn(url) {
    window.open(url, '_blank');
}

function copyDMToClipboard(index, platform) {
    const selector = platform === 'ig' ? `[data-ig-dm="${index}"]` : `[data-li-dm="${index}"]`;
    const text = document.querySelector(selector).value;
    copyToClipboard(text, `✓ ${platform === 'ig' ? 'Instagram' : 'LinkedIn'} DM copied!`);
}

function saveRepNotes(index) {
    const notes = document.querySelector(`[data-rep-notes="${index}"]`).value;
    state.notes[index] = notes;
    showToast('✓ Notes saved!');
}

function exportProspectData(index) {
    const prospect = prospects[index];
    const status = state.statuses[index] || "Not Contacted";
    const notes = state.notes[index] || "";
    const subject = document.querySelector(`[data-email-subject="${index}"]`).value;
    const body = document.querySelector(`[data-email-body="${index}"]`).value;

    const data = `
PROSPECT: ${prospect.name}
EMAIL: ${prospect.contactEmail}
PHONE: ${prospect.contactPhone}
CONTACT: ${prospect.contactName} - ${prospect.contactTitle}

STATUS: ${status}
DISTANCE: ${prospect.distance} km
EMPLOYEES: ${prospect.employees}
RATING: ${prospect.rating}

EMAIL SUBJECT: ${subject}

EMAIL BODY:
${body}

REP NOTES:
${notes}

---
Exported from Bulkamania Daily Prospects Dashboard
Generated: ${new Date().toLocaleString()}
    `.trim();

    copyToClipboard(data, '✓ Prospect data exported!');
}

// ============================================
// FILTERING & SEARCH
// ============================================
function updateFilter() {
    const filter = state.currentFilter;
    const search = state.searchTerm.toLowerCase();

    document.querySelectorAll('.prospect-card').forEach((card, index) => {
        const prospect = prospects[index];
        let visible = true;

        if (filter !== 'all' && prospect.rating.toLowerCase() !== filter) {
            visible = false;
        }

        if (search && !prospect.name.toLowerCase().includes(search) && !prospect.contactName.toLowerCase().includes(search)) {
            visible = false;
        }

        card.classList.toggle('hidden', !visible);
    });

    updateProgress();
}

document.addEventListener('DOMContentLoaded', () => {
    // Render all cards
    const grid = document.getElementById('prospectsGrid');
    grid.innerHTML = prospects.map((p, i) => renderCard(i, p)).join('');

    // Setup character counters
    prospects.forEach((_, index) => {
        const igDm = document.querySelector(`[data-ig-dm="${index}"]`);
        const liDm = document.querySelector(`[data-li-dm="${index}"]`);

        if (igDm) {
            igDm.addEventListener('input', () => {
                document.getElementById(`igCharCount${index}`).textContent = `${igDm.value.length}/300 chars`;
                if (igDm.value.length > 300) {
                    document.getElementById(`igCharCount${index}`).classList.add('warning');
                } else {
                    document.getElementById(`igCharCount${index}`).classList.remove('warning');
                }
            });
        }

        if (liDm) {
            liDm.addEventListener('input', () => {
                document.getElementById(`liCharCount${index}`).textContent = `${liDm.value.length}/300 chars`;
                if (liDm.value.length > 300) {
                    document.getElementById(`liCharCount${index}`).classList.add('warning');
                } else {
                    document.getElementById(`liCharCount${index}`).classList.remove('warning');
                }
            });
        }
    });

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            state.currentFilter = btn.dataset.filter;
            updateFilter();
        });
    });

    // Search input
    document.getElementById('searchInput').addEventListener('input', (e) => {
        state.searchTerm = e.target.value;
        updateFilter();
    });

    // Header toggle
    document.getElementById('toggleHeaderBtn').addEventListener('click', function() {
        const header = document.getElementById('header');
        header.classList.toggle('collapsed');
        this.textContent = header.classList.contains('collapsed') ? '+' : '−';
    });

    // Scroll header collapse
    window.addEventListener('scroll', () => {
        const header = document.getElementById('header');
        if (window.scrollY > 80 && !header.classList.contains('collapsed')) {
            header.classList.add('collapsed');
            document.getElementById('toggleHeaderBtn').textContent = '+';
        } else if (window.scrollY <= 80 && header.classList.contains('collapsed')) {
            header.classList.remove('collapsed');
            document.getElementById('toggleHeaderBtn').textContent = '−';
        }
    });

    // Export all
    document.getElementById('exportAllBtn').addEventListener('click', () => {
        let allData = 'BULKAMANIA PROSPECTS EXPORT\nGenerated: ' + new Date().toLocaleString() + '\n\n';

        prospects.forEach((prospect, index) => {
            const status = state.statuses[index] || "Not Contacted";
            const notes = state.notes[index] || "";
            allData += `${prospect.name} | ${prospect.contactName} | ${prospect.contactEmail} | Status: ${status}\n`;
            if (notes) allData += `Notes: ${notes}\n`;
            allData += '\n';
        });

        copyToClipboard(allData, '✓ All prospects exported!');
    });

    updateProgress();
});

function updateProgress() {
    const visited = Object.keys(state.statuses).length;
    const total = prospects.length;
    const percent = (visited / total) * 100;

    document.getElementById('progressFill').style.width = percent + '%';
    document.getElementById('progressText').textContent = `${visited}/${total}`;

    const hotCount = prospects.filter(p => p.rating === 'Hot').length;
    const warmCount = prospects.filter(p => p.rating === 'Warm').length;
    const coolCount = prospects.filter(p => p.rating === 'Cool').length;

    document.getElementById('hotCount').textContent = hotCount;
    document.getElementById('warmCount').textContent = warmCount;
    document.getElementById('coolCount').textContent = coolCount;

    document.getElementById('sessionStats').innerHTML = `
        <div>Last updated: ${new Date().toLocaleTimeString()}</div>
        <div>Total: ${total} | Hot: ${hotCount} | Warm: ${warmCount} | Cool: ${coolCount}</div>
        <div>Status tracked: ${visited} prospects</div>
    `;
}
</script>

</body>
</html>
