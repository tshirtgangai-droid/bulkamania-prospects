            });

            filtered.forEach(lead => {
                leadsGrid.appendChild(createLeadCard(lead));
            });

        function updateStatus(leadId, status) {
            contactedLeads[leadId] = status;

            renderLeads(currentFilter, searchInput.value);

        function updateProgress() {
            const contacted = Object.values(contactedLeads).filter(s => s !== 'Not Contacted').length;
            document.getElementById('contactedCount').textContent = `${contacted}/20`;

            const hotCount = leads.filter(l => l.deal === 'hot').length;
            const warmCount = leads.filter(l => l.deal === 'warm').length;
            const coolCount = leads.filter(l => l.deal === 'cool').length;

            document.getElementById('hotCount').textContent = hotCount;
            document.getElementById('warmCount').textContent = warmCount;
            document.getElementById('coolCount').textContent = coolCount;

            document.getElementById('footerHot').textContent = hotCount;
            document.getElementById('footerWarm').textContent = warmCount;
            document.getElementById('footerCool').textContent = coolCount;

        function openGmail(leadId) {
            const lead = leads.find(l => l.id === leadId);
            const subject = document.getElementById(`emailSubject${leadId}`).value;
            const body = document.getElementById(`emailBody${leadId}`).value;
            const to = lead.email;
            window.open(`https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(to)}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`, '_blank');
        }

        function copyToClipboard(text, msg) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => showToast(msg)).catch(() => fallbackCopy(text, msg));
            } else {
                fallbackCopy(text, msg);
            }
        }

        function fallbackCopy(text, msg) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showToast(msg);
        }

        function showToast(msg) {
            let toast = document.getElementById('copyToast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'copyToast';
                toast.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;';
                document.body.appendChild(toast);
            }
            toast.textContent = msg;
            toast.style.opacity = '1';
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => {
                toast.style.opacity = '0';
            }, 1500);
        }

        function copyEmailText(leadId) {
            const subject = document.getElementById(`emailSubject${leadId}`).value;
            const body = document.getElementById(`emailBody${leadId}`).value;
            const fullEmail = `Subject: ${subject}\n\n${body}`;
            copyToClipboard(fullEmail, 'Email copied to clipboard!');
        }

        function resetEmail(leadId) {
            const lead = leads.find(l => l.id === leadId);
            document.getElementById(`emailSubject${leadId}`).value = lead.emailSubject;
            document.getElementById(`emailBody${leadId}`).value = lead.emailBody;
            showToast('Email reset to default');
        }

        function copyDMText(leadId, platform) {
            const dmText = document.getElementById(`${platform}DM${leadId}`).value;
            copyToClipboard(dmText, `${platform.charAt(0).toUpperCase() + platform.slice(1)} DM copied!`);
        }

        function openInstagram(handle) {
            if (handle && handle !== 'Search' && handle !== 'Has account') {
                window.open(`https://instagram.com/${handle.replace('@', '')}`, '_blank');

        function openLinkedin(companyUrl) {
            if (companyUrl) {

            const content = header.nextElementSibling;
            const toggle = header.querySelector('.collapsible-toggle');
            content.classList.toggle('active');

            a.download = 'Bulkamania-All-Leads-2026-03-18.txt';

        // Event listeners
        searchInput.addEventListener('input', (e) => {
            renderLeads(currentFilter, e.target.value);
        });

        filterBtns.forEach(btn => {

                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderLeads(currentFilter, searchInput.value);
            });
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'f') {
                e.preventDefault();
                searchInput.focus();
            }
            if (e.ctrlKey && e.key === 'p') {
                e.preventDefault();
                window.print();
            }
        });

        // Initial render
        renderLeads();
    </script>
